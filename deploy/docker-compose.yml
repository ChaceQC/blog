name: blog

services:
  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
    env_file:
      - ./env/nginx.env
    environment:
      NGINX_ENVSUBST_FILTER: "^BLOG_(DOMAIN|SSL_CERTIFICATE|SSL_CERTIFICATE_KEY)$"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - certbot-www:/var/www/certbot
      - ./certs/letsencrypt:/etc/letsencrypt:ro
      - /data/blog/uploads/public:/data/blog/uploads/public:ro
    networks:
      - public
      - private

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ./env/backend.env
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - /data/blog/uploads:/data/blog/uploads
    networks:
      - private

  mysql:
    image: mysql:8.4
    env_file:
      - ./env/mysql.env
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    volumes:
      - mysql-data:/var/lib/mysql
      - /data/blog/backups/mysql:/backups
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - private

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - private

  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    volumes:
      - certbot-www:/var/www/certbot
      - ./certs/letsencrypt:/etc/letsencrypt
    networks:
      - public

volumes:
  mysql-data:
  redis-data:
  certbot-www:

networks:
  public:
  private:
    internal: true
